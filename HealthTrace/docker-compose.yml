version: '3.8'

services:
  # PostgreSQL Database with TimescaleDB extension for time-series data
  database:
    image: timescale/timescaledb:latest-pg14
    container_name: healthtrace_db
    environment:
      POSTGRES_DB: healthtrace
      POSTGRES_USER: healthtrace
      POSTGRES_PASSWORD: healthtrace_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Kafka for real-time data streaming
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: healthtrace_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: healthtrace_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: healthtrace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Backend FastAPI Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthtrace_backend
    depends_on:
      - database
      - kafka
      - redis
    environment:
      DATABASE_URL: postgresql://healthtrace:healthtrace_password@database:5432/healthtrace
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-production-secret-key-change-this
      BACKEND_CORS_ORIGINS: '["http://localhost:3200","http://frontend:3000"]'
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthtrace_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8001
    ports:
      - "3200:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Data Pipeline Service
  data-pipeline:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: healthtrace_data_pipeline
    depends_on:
      - database
      - kafka
    environment:
      DATABASE_URL: postgresql://healthtrace:healthtrace_password@database:5432/healthtrace
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ISPRA_API_BASE_URL: https://indicatoriambientali.isprambiente.it/api
      ARPA_CAMPANIA_API_BASE_URL: https://dati.arpacampania.it/api
    volumes:
      - ./data-pipeline:/app
      - pipeline_data:/app/data
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Analytics Service
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: healthtrace_analytics
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://healthtrace:healthtrace_password@database:5432/healthtrace
    volumes:
      - ./analytics:/app
      - analytics_models:/app/models
    networks:
      - healthtrace_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: healthtrace_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/ssl:/etc/nginx/ssl
    networks:
      - healthtrace_network
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  redis_data:
  backend_uploads:
  pipeline_data:
  analytics_models:

networks:
  healthtrace_network:
    driver: bridge
